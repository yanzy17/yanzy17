<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panduan Shopee Affiliate</title>
  <style>
    :root{--primary:#ee4d2d;--primary-light:#fff1ec;--bg:#f8f9fa;--surface:#fff;--ink:#1a1a1a;--ink2:#555;--ink3:#999;--border:#eee;--radius:14px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;padding-bottom:80px}
    .nav{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;z-index:100;display:flex;align-items:center;gap:10px}
    .nav h1{font-size:1.1rem;color:var(--primary)}
    .hero{text-align:center;padding:40px 20px 30px;background:linear-gradient(135deg,var(--primary-light),var(--surface))}
    .hero h2{font-size:1.6rem;color:var(--ink);margin-bottom:8px}
    .hero p{color:var(--ink2);font-size:.95rem}
    .menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;padding:20px;max-width:700px;margin:0 auto}
    .menu-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;font-size:.82rem;font-weight:600;color:var(--ink2);cursor:pointer;transition:.2s}
    .menu-btn:hover,.menu-btn.active{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
    .content{max-width:700px;margin:0 auto;padding:0 16px}
    .section-title{font-size:1.2rem;font-weight:700;margin:24px 0 12px;color:var(--ink)}
    .out-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;cursor:pointer;transition:.2s;position:relative}
    .out-item:hover{border-color:var(--primary);box-shadow:0 2px 12px rgba(238,77,45,.08)}
    .out-item::after{content:'Tap to copy';position:absolute;top:12px;right:12px;font-size:.7rem;color:var(--ink3);opacity:0;transition:.2s}
    .out-item:hover::after{opacity:1}
    .out-item h4{font-size:.85rem;color:var(--primary);margin-bottom:6px}
    .out-item p{font-size:.9rem;color:var(--ink2)}
    .edu-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
    .edu-card h3{color:var(--primary);font-size:1rem;margin-bottom:8px}
    .edu-card p{font-size:.88rem;color:var(--ink2);margin-bottom:6px}
    .edu-card .highlight{background:var(--primary-light);border-radius:8px;padding:10px 14px;font-size:.85rem;color:var(--ink);margin-top:8px;font-style:italic}
    .checklist{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
    .checklist h3{color:var(--primary);font-size:1rem;margin-bottom:10px}
    .checklist ul{list-style:none;padding:0}
    .checklist li{font-size:.88rem;color:var(--ink2);padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px}
    .checklist li:last-child{border-bottom:none}
    .checklist li::before{content:'☐';color:var(--primary);font-size:1rem;flex-shrink:0}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink);color:#fff;padding:12px 24px;border-radius:30px;font-size:.85rem;z-index:999;transition:.3s;opacity:0}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .footer{text-align:center;padding:40px 20px;color:var(--ink3);font-size:.8rem}
    @media(max-width:480px){.menu-grid{grid-template-columns:repeat(3,1fr);gap:8px}.hero h2{font-size:1.3rem}}
  </style>
</head>
<body>
  <nav class="nav"><h1>🛒 Shopee Affiliate Guide</h1></nav>
  <section class="hero">
    <h2>Panduan Shopee Affiliate</h2>
    <p>Strategi lengkap biar komisi lo makin gendut — dari sebar link sampai scale up</p>
  </section>
  <div class="menu-grid">
    <div class="menu-btn active" data-tab="dasar">Dasar Affiliate</div>
    <div class="menu-btn" data-tab="sebar">Sebar Link</div>
    <div class="menu-btn" data-tab="konten">Konten Convert</div>
    <div class="menu-btn" data-tab="komisi">Strategi Komisi</div>
    <div class="menu-btn" data-tab="platform">Platform</div>
    <div class="menu-btn" data-tab="kesalahan">Kesalahan Fatal</div>
    <div class="menu-btn" data-tab="action">Action Plan</div>
  </div>
  <div class="content" id="content"></div>
  <div class="toast" id="toast">Berhasil disalin! 📋</div>
  <footer class="footer">Panduan Shopee Affiliate &middot; by @yanzy17</footer>

  <script>
    function escapeHTML(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
    function escapeAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

    const data={
      dasar:[
        {title:"Cara Kerja Komisi",desc:"Buyer klik link affiliate lo → beli produk → lo dapet persentase komisi. Sesimpel itu! Komisi Shopee berkisar 3-15% tergantung kategori produk.",highlight:"Contoh: Produk 200rb, komisi 10% = lo dapet 20rb. Kalau sehari 10 orang beli, itu 200rb/hari tanpa modal!"},
        {title:"Jenis Komisi",desc:"Ada 2 tipe: Shopee Commission (base rate dari Shopee) dan Commission XTRA (bonus tambahan dari seller). Gabungan keduanya bisa bikin komisi lo 2-3x lipat.",highlight:"Pro tip: Filter produk yang punya badge 'Commission XTRA' di Shopee Affiliate Center biar earning makin gede!"},
        {title:"Cookie Window 7 Hari",desc:"Begitu buyer klik link lo, semua pembelian dia dalam 7 hari ke depan masuk komisi lo. Bahkan kalau dia beli produk LAIN yang gak lo promosiin!",highlight:"Ini kenapa timing sebar link pas event gede itu crucial — orang belanja banyak = komisi numpuk!"},
        {title:"Syarat Komisi Cair",desc:"Komisi baru masuk saldo setelah: order selesai (buyer konfirmasi terima barang) + gak ada return/refund. Biasanya 7-14 hari setelah barang diterima.",highlight:"Jangan promosiin produk yang rating jelek — buyer return = komisi lo hangus! Pilih toko rating 4.8+ aja."}
      ],
      sebar:[
        {title:"Generate Link di Affiliate Center",desc:"Buka Shopee Affiliate Center → cari produk → klik 'Generate Link'. Lo bisa generate link produk, link toko, atau link kategori."},
        {title:"Bio IG / TikTok / Threads",desc:"Taroh link di bio. Ini 'rumah' traffic lo. Semua konten lo arahkan ke bio. Pakai Linktree kalau mau kumpulin banyak link."},
        {title:"Caption & Story IG",desc:"Sebar di caption dengan CTA jelas: 'Link di bio ya!' atau pakai link sticker di Story buat direct access ke produk."},
        {title:"Grup WhatsApp & Telegram",desc:"Share di grup yang relevan (grup ibu-ibu, grup beauty, dll). Jangan spam — kasih konteks dan review singkat kenapa produknya worth it."},
        {title:"Shortlink Resmi",desc:"Pakai s.shopee.co.id (resmi dari Shopee) atau bit.ly buat bikin link lebih rapi. Link panjang = keliatan spam, link pendek = clean & trustworthy."},
        {title:"Deep Link Strategy",desc:"Pakai deep link yang langsung buka halaman produk di app Shopee (bukan web). Conversion rate jauh lebih tinggi karena user langsung checkout."},
        {title:"Timing Sebar: Flash Sale & Payday",desc:"Sebar link pas flash sale, payday sale, atau tanggal kembar (11.11, 12.12). Orang lagi dalam 'buying mood' = conversion rate naik drastis."},
        {title:"Numpang Traffic Komentar Viral",desc:"Komen di postingan viral orang lain yang relevan. Kasih value + arahkan ke bio/link lo. Free traffic dari audience orang lain!"},
        {title:"Linktree / Lynk.id",desc:"Kumpulin semua link affiliate lo di satu halaman Linktree/Lynk.id. Gampang di-manage, gampang di-share, keliatan profesional."},
        {title:"Pin Comment TikTok",desc:"Upload video review → pin comment berisi link affiliate. Ini trik yang banyak affiliator top pakai karena comment paling atas pasti keliatan."},
        {title:"Broadcast WA & Telegram Channel",desc:"Bikin channel Telegram atau broadcast list WA khusus deals. Audience yang join = udah interested. Conversion rate super tinggi karena mereka opt-in."}
      ],
      konten:[
        {title:"Formula P-A-S-CTA",desc:"Problem (masalah) → Agitate (bikin relatable) → Solution (produk lo) → CTA (link). Formula copywriting paling proven buat jualan."},
        {title:"Video Unboxing / Review Jujur",desc:"Tunjukin real experience lo pake produk. Jangan lebay — yang jujur justru lebih convert karena orang percaya."},
        {title:"Before-After / Transformasi",desc:"Tunjukin perbandingan sebelum & sesudah pakai produk. Skincare, tools, gadget — visual transformation itu powerful banget."},
        {title:"Listicle: 'X Produk Under 50rb'",desc:"'5 produk under 50rb yang bikin hidup lo lebih gampang' — format ini selalu works karena orang suka rekomendasi yang affordable."},
        {title:"Comparison: Produk A vs B",desc:"Bandingin 2 produk serupa. Tunjukin pro-cons masing-masing. Orang yang lagi bingung pilih = langsung klik link rekomendasi lo."},
        {title:"Tutorial Pakai Produk",desc:"Bikin tutorial singkat cara pakai. Misal: 'Cara setup ring light ini biar hasilnya studio quality'. Value + product placement = natural selling."},
        {title:"Day-in-My-Life + Product Mention",desc:"Bikin konten daily vlog yang natural mention produk. 'Pagi ini gue pake skincare ini...' — soft selling yang gak keliatan jualan."},
        {title:"Reverse Psychology: 'Jangan Beli Sebelum...'",desc:"'Jangan beli sebelum baca ini!' — judul kayak gini bikin orang penasaran dan justru mau tau kenapa. Curiosity gap = klik."},
        {title:"Storytelling: Skeptis → Repeat Order",desc:"'Awalnya gue skeptis, ternyata ini game changer...' — cerita personal yang relatable bikin trust naik dan orang mau coba."},
        {title:"Trending Sound + Product Placement",desc:"Pakai sound viral di TikTok/Reels + sisipkan produk. Algoritma push karena sound trending + lo dapet exposure gratisan."},
        {title:"Konten Edukasi + Soft CTA",desc:"Kasih tips/edukasi related ke produk, terus di akhir: 'btw produk yang gue pake di video ini ada di link bio'. Natural dan gak pushy."}
      ],
      komisi:[
        {title:"Pilih Produk Commission XTRA",desc:"Filter produk yang punya label Commission XTRA di Affiliate Center. Komisi bisa 10-20%! Jauh lebih gede dari base commission yang cuma 3-5%."},
        {title:"Fokus Kategori Komisi Tinggi",desc:"Fashion, Beauty, dan Lifestyle itu kategori dengan base commission paling tinggi. Electronics mungkin mahal, tapi komisi %-nya kecil."},
        {title:"Target New Buyer Shopee",desc:"Kalau buyer yang klik link lo itu BARU pertama kali beli di Shopee, komisi lo bisa 2-3x lipat! Ini bonus dari program Shopee."},
        {title:"Manfaatin Flash Sale & Voucher",desc:"Promosiin produk yang lagi flash sale. Harga diskon = orang lebih gampang checkout = conversion rate naik = komisi lebih banyak masuk."},
        {title:"Promosi Bundle / Cart",desc:"Arahkan buyer buat beli banyak produk sekaligus. 1 klik link, buyer beli 5 barang = lo dapet komisi dari SEMUA 5 barang itu. Stacking!"},
        {title:"Konsisten Posting = Algoritma Push",desc:"Makin sering lo posting, makin banyak reach. Makin banyak reach = makin banyak klik link = makin banyak komisi. Simple math."},
        {title:"Track Performa Lo",desc:"Cek dashboard Affiliate Center: CTR (click-through rate), conversion rate, produk mana yang paling laku. Double down yang works, cut yang gak."},
        {title:"Diversifikasi Produk",desc:"Jangan cuma promosiin 1 produk. Sebar di 5-10 produk beda. Kalau satu flop, yang lain bisa carry. Jangan taroh semua telur di satu keranjang."},
        {title:"Ride the Momentum Event Shopee",desc:"Setiap bulan Shopee pasti ada event (payday, tanggal kembar, brand day). Ini waktu terbaik push konten karena orang udah niat belanja."}
      ],
      platform:[
        {title:"TikTok",desc:"Best for viral reach. Video pendek 15-60 detik, review produk, unboxing. Algoritma push ke FYP = exposure gila walau followers dikit. Pakai trending sound!",highlight:"Pro tip: Pin comment dengan link affiliate. Upload 2-3 video/hari buat maximize reach."},
        {title:"Instagram Reels & Story",desc:"Aesthetic content + Reels buat reach baru + Story link sticker buat direct traffic. Carousel post juga works buat listicle produk.",highlight:"Pro tip: Story Highlights khusus 'Rekomendasi' biar orang bisa akses kapan aja."},
        {title:"Threads",desc:"Text-based platform yang lagi naik. Hook kuat + review singkat + 'link di bio'. Engagement organik masih tinggi karena platform baru.",highlight:"Pro tip: Bikin thread panjang review produk, CTA di akhir. Simpel tapi efektif."},
        {title:"Telegram Channel",desc:"Direct push ke audience yang udah loyal. Bisa share deals harian, flash sale alert, produk rekomendasi. Open rate tinggi banget.",highlight:"Pro tip: Bikin channel 'Daily Deals' + schedule post tiap jam 8 pagi & 8 malam."},
        {title:"WhatsApp Status",desc:"Personal touch yang bikin trust tinggi. Temen & keluarga lihat lo genuinely pakai produk = lebih percaya & mau beli lewat link lo.",highlight:"Pro tip: Update status 3-5x sehari. Mix antara personal life & product recommendation."},
        {title:"YouTube Shorts",desc:"Evergreen content — video lo bisa dapet views berbulan-bulan setelah upload. Plus, YouTube punya search traffic = orang cari review produk di sana.",highlight:"Pro tip: Optimasi judul & deskripsi buat SEO. 'Review [nama produk] Shopee 2024' itu keyword emas."}
      ],
      kesalahan:[
        {title:"Spam Link Tanpa Konteks",desc:"Sebar link doang tanpa kasih alasan kenapa orang harus beli = keliatan spam. Selalu kasih konteks: review singkat, alasan beli, pengalaman lo."},
        {title:"Pilih Produk Asal-asalan",desc:"Produk rating jelek, toko sepi, review negatif = buyer return = komisi hangus. Always cek rating 4.8+, penjualan 1000+, dan review positif."},
        {title:"Gak Pake CTA di Konten",desc:"Konten bagus tapi gak bilang 'klik link di bio' atau 'cek link di comment' = orang gak tau harus ngapain. SELALU kasih CTA yang jelas."},
        {title:"Cuma Sebar di 1 Platform",desc:"Kalau cuma di IG doang, lo miss traffic dari TikTok, Threads, Telegram, dll. Diversifikasi platform = multiple income stream dari 1 konten."},
        {title:"Gak Track Performa",desc:"Gak tau produk mana yang convert, platform mana yang paling banyak klik = lo kerja buta. Cek dashboard minimal seminggu sekali!"},
        {title:"Promosi Produk Gak Sesuai Niche",desc:"Akun beauty tiba-tiba promosi spare part motor = audience confused & gak trust. Stay on niche biar audience lo tau lo expert di bidang itu."},
        {title:"Gak Konsisten",desc:"Posting seminggu rajin, terus hilang sebulan = algoritma lupa lo exist. Konsistensi > intensitas. Mending 1x/hari tiap hari daripada 10x terus hilang."},
        {title:"Copy Paste Konten Orang",desc:"Selain kena takedown/report, audience juga bisa bedain mana yang original vs kopas. Bikin konten sendiri, pake voice lo sendiri. Authenticity sells."}
      ],
      action:[
        {title:"Minggu 1: Foundation",items:["Lengkapin profil di semua platform (bio + foto + link)","Daftar & setup Shopee Affiliate Center","Pilih niche utama (beauty/fashion/gadget/lifestyle)","Riset & pilih 5 produk pertama (rating 4.8+, Commission XTRA)","Bikin 3 konten pertama (1 review, 1 listicle, 1 unboxing)","Setup Linktree / Lynk.id untuk kumpulin semua link"]},
        {title:"Minggu 2: Eksekusi",items:["Posting 1x/hari di platform utama","Sebar link di minimal 3 platform berbeda","Reply semua comment & DM (engage audience)","Bikin 2 Story IG/hari dengan link sticker","Join & kontribusi di 3 grup WA/Telegram yang relevan","Eksperimen format konten: video vs carousel vs text"]},
        {title:"Minggu 3: Analisis & Optimasi",items:["Cek dashboard: produk mana yang paling banyak klik & convert","Ganti/cut produk yang gak perform selama 2 minggu","Double down konten format yang paling banyak engagement","Scale produk & konten yang works (bikin variasi)","Mulai track earning harian di spreadsheet","A/B test: beda CTA, beda jam posting, beda hook"]},
        {title:"Minggu 4: Scale Up",items:["Tambah 1 platform baru (misal: dari IG expand ke TikTok)","Naikin frekuensi posting jadi 2x/hari","Evaluasi total earning bulan ini vs target","Bikin content calendar untuk bulan depan","Set target realistis untuk bulan ke-2","Celebrate small wins & adjust strategy!"]}
      ]
    };

    function renderDasar(){
      return `<h3 class="section-title">Dasar Affiliate</h3>`+data.dasar.map(d=>`<div class="edu-card"><h3>${escapeHTML(d.title)}</h3><p>${escapeHTML(d.desc)}</p><div class="highlight">${escapeHTML(d.highlight)}</div></div>`).join('')
    }
    function renderTips(arr,label){
      return `<h3 class="section-title">${escapeHTML(label)}</h3>`+arr.map(t=>`<div class="out-item" data-copy="${escapeAttr(t.title+': '+t.desc)}"><h4>${escapeHTML(t.title)}</h4><p>${escapeHTML(t.desc)}</p></div>`).join('')
    }
    function renderPlatform(){
      return `<h3 class="section-title">Platform Terbaik</h3>`+data.platform.map(p=>`<div class="edu-card"><h3>${escapeHTML(p.title)}</h3><p>${escapeHTML(p.desc)}</p><div class="highlight">${escapeHTML(p.highlight)}</div></div>`).join('')
    }
    function renderKesalahan(){
      return `<h3 class="section-title">Kesalahan Fatal</h3>`+data.kesalahan.map(k=>`<div class="out-item" data-copy="${escapeAttr(k.title+': '+k.desc)}"><h4>❌ ${escapeHTML(k.title)}</h4><p>${escapeHTML(k.desc)}</p></div>`).join('')
    }
    function renderAction(){
      return `<h3 class="section-title">Action Plan 30 Hari</h3>`+data.action.map(a=>`<div class="checklist"><h3>${escapeHTML(a.title)}</h3><ul>${a.items.map(i=>`<li>${escapeHTML(i)}</li>`).join('')}</ul></div>`).join('')
    }

    const tabs={
      dasar:()=>renderDasar(),
      sebar:()=>renderTips(data.sebar,'Sebar Link'),
      konten:()=>renderTips(data.konten,'Konten yang Convert'),
      komisi:()=>renderTips(data.komisi,'Strategi Komisi Maksimal'),
      platform:()=>renderPlatform(),
      kesalahan:()=>renderKesalahan(),
      action:()=>renderAction()
    };

    const content=document.getElementById('content');
    const toast=document.getElementById('toast');

    function showTab(tab){
      document.querySelectorAll('.menu-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
      content.innerHTML=tabs[tab]();
    }

    document.querySelector('.menu-grid').addEventListener('click',e=>{
      const btn=e.target.closest('.menu-btn');
      if(btn)showTab(btn.dataset.tab);
    });

    content.addEventListener('click',e=>{
      const item=e.target.closest('[data-copy]');
      if(!item)return;
      const text=item.getAttribute('data-copy');
      navigator.clipboard.writeText(text).then(()=>{
        toast.classList.add('show');
        setTimeout(()=>toast.classList.remove('show'),2000);
      });
    });

    showTab('dasar');
  </script>
</body>
</html>
