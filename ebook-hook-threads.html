<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>200+ Hook & Template Threads</title>
  <style>
    :root{--primary:#ee4d2d;--primary-light:#fff1ec;--bg:#f8f9fa;--surface:#fff;--ink:#1a1a1a;--ink2:#555;--ink3:#999;--border:#eee;--radius:14px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;padding-bottom:80px}
    .nav{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;z-index:100;display:flex;align-items:center;gap:10px}
    .nav h1{font-size:1.1rem;color:var(--primary)}
    .hero{text-align:center;padding:40px 20px 30px;background:linear-gradient(135deg,var(--primary-light),var(--surface))}
    .hero h2{font-size:1.6rem;color:var(--ink);margin-bottom:8px}
    .hero p{color:var(--ink2);font-size:.95rem}
    .menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:20px;max-width:700px;margin:0 auto}
    .menu-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;font-size:.82rem;font-weight:600;color:var(--ink2);cursor:pointer;transition:.2s}
    .menu-btn:hover,.menu-btn.active{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
    .content{max-width:700px;margin:0 auto;padding:0 16px}
    .section-title{font-size:1.2rem;font-weight:700;margin:24px 0 12px;color:var(--ink)}
    .out-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;cursor:pointer;transition:.2s;position:relative}
    .out-item:hover{border-color:var(--primary);box-shadow:0 2px 12px rgba(238,77,45,.08)}
    .out-item::after{content:'Tap to copy';position:absolute;top:12px;right:12px;font-size:.7rem;color:var(--ink3);opacity:0;transition:.2s}
    .out-item:hover::after{opacity:1}
    .out-item h4{font-size:.85rem;color:var(--primary);margin-bottom:6px}
    .out-item p{font-size:.9rem;color:var(--ink2)}
    .edu-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
    .edu-card h3{color:var(--primary);font-size:1rem;margin-bottom:8px}
    .edu-card p{font-size:.88rem;color:var(--ink2);margin-bottom:6px}
    .edu-card .example{background:var(--primary-light);border-radius:8px;padding:10px 14px;font-size:.85rem;color:var(--ink);margin-top:8px;font-style:italic}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink);color:#fff;padding:12px 24px;border-radius:30px;font-size:.85rem;z-index:999;transition:.3s;opacity:0}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .footer{text-align:center;padding:40px 20px;color:var(--ink3);font-size:.8rem}
    @media(max-width:480px){.menu-grid{grid-template-columns:repeat(3,1fr);gap:8px}.hero h2{font-size:1.3rem}}
  </style>
</head>
<body>
  <nav class="nav"><h1>Hook & Threads</h1></nav>
  <section class="hero">
    <h2>200+ Hook & Template Threads</h2>
    <p>Koleksi lengkap buat konten Threads yang viral & nendang</p>
  </section>
  <div class="menu-grid">
    <div class="menu-btn active" data-tab="edukasi">Edukasi</div>
    <div class="menu-btn" data-tab="pembuka">Hook Pembuka</div>
    <div class="menu-btn" data-tab="story">Hook Story</div>
    <div class="menu-btn" data-tab="kontroversi">Hook Kontroversi</div>
    <div class="menu-btn" data-tab="engagement">Hook Engagement</div>
    <div class="menu-btn" data-tab="template">Template Utas</div>
    <div class="menu-btn" data-tab="tips">Tips Viral</div>
  </div>
  <div class="content" id="content"></div>
  <div class="toast" id="toast">Berhasil disalin!</div>
  <footer class="footer">200+ Hook & Template Threads &middot; by @yanzy17</footer>

  <script>
    function escapeHTML(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
    function escapeAttr(str){return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

    const data={
      edukasi:[
        {title:"Apa Itu Threads?",desc:"Platform microblogging dari Meta yang fokus ke teks pendek. Cocok buat sharing insight, cerita, dan diskusi santai.",example:"Threads = Twitter-nya Instagram. Nulis pendek, engagement gede!"},
        {title:"Apa Itu Hook?",desc:"Kalimat pembuka yang bikin orang berhenti scroll. Hook yang bagus = 80% keberhasilan kontenmu.",example:"\"Gue hampir bangkrut di umur 22...\" <- ini hook storytelling yang bikin penasaran"},
        {title:"Apa Itu Utas (Thread)?",desc:"Rangkaian postingan yang saling nyambung. Biasanya 5-10 post yang bahas satu topik secara mendalam.",example:"Post 1: Hook | Post 2-4: Isi | Post 5: CTA. Simple tapi powerful!"},
        {title:"Formula Viral",desc:"Hook kuat + Nilai tinggi + CTA jelas + Timing tepat = Viral. Konsisten posting minimal 2x sehari.",example:"Posting jam 7-9 pagi & 7-10 malam. Ini golden hour Threads!"}
      ],
      pembuka:[
        "Unpopular opinion: kebanyakan orang gagal bukan karena bodoh, tapi karena...",
        "Gue dapet penghasilan pertama dari internet cuma modal HP. Ini caranya:",
        "Stop bilang 'nanti aja'. Ini yang terjadi kalau lo terus nunda:",
        "3 hal yang gue wish tau di umur 20:",
        "Ini rahasia yang gak pernah diajarkan di sekolah:",
        "Kalau lo masih struggle cari uang online, baca ini sampai habis.",
        "Gue analisis 100 akun viral di Threads. Ini polanya:",
        "Mau tau kenapa konten lo sepi? Ini alasannya:",
        "Jangan pernah lakuin ini kalau mau sukses di 2024:",
        "Orang kaya dan orang miskin bedanya cuma di 1 hal ini:",
        "Lo tau gak, 90% orang salah paham soal passive income:",
        "Ini template yang bikin gue dapet 10K followers dalam sebulan:"
      ],
      story:[
        "2 tahun lalu gue cuma karyawan biasa dengan gaji UMR. Sekarang...",
        "Cerita ini dimulai waktu gue di-PHK mendadak tanpa pesangon...",
        "Temen gue ngetawain gue waktu bilang mau jadi content creator...",
        "Dulu gue malu banget jualan online. Sampai akhirnya...",
        "Gue pernah rugi 50 juta karena satu kesalahan kecil ini:",
        "Ada satu momen yang mengubah hidup gue 180 derajat...",
        "Waktu semua orang bilang gue gak bakal berhasil, gue malah...",
        "Gue mulai dari nol. Literally nol. Gak punya modal, gak punya skill...",
        "Kisah ini tentang gimana gue bangkit dari titik terendah...",
        "3 bulan lalu gue hampir nyerah. Tapi satu hal ini bikin gue bertahan:",
        "Ini bukan cerita sukses instan. Ini cerita jatuh bangun yang real:",
        "Perjalanan dari 0 ke 100 juta pertama gue dimulai dari hal sepele ini:"
      ],
      kontroversi:[
        "Kuliah itu scam terbesar di Indonesia. Here's why:",
        "Hustle culture itu toxic dan lo harus berhenti sekarang.",
        "90% motivator di internet itu cuma jualan mimpi.",
        "Kerja keras BUKAN kunci sukses. Yang bener adalah...",
        "Gue berani bilang: followers banyak itu gak guna kalau...",
        "Hot take: side hustle itu cuma bikin lo tambah capek, bukan kaya.",
        "Controversial tapi fakta: orang introvert lebih gampang sukses online.",
        "Gue gak setuju sama semua 'guru bisnis' yang bilang...",
        "Ini bakal bikin banyak orang triggered, tapi...",
        "Unpopular opinion: resign tanpa backup plan itu kadang pilihan terbaik.",
        "Yang sering diajarkan soal investasi itu 80% SALAH:",
        "Berani taruhan, 95% dari kalian salah paham soal algoritma:"
      ],
      engagement:[
        "Setuju atau gak setuju? Menurut gue...",
        "Coba jawab jujur: lo lebih milih waktu atau uang?",
        "Tag temen lo yang perlu baca ini!",
        "Simpan post ini sebelum hilang. Lo bakal butuh nanti.",
        "Rate kehidupan lo sekarang 1-10. Tulis di komen.",
        "Siapa yang relate? Angkat tangan!",
        "Kalau lo cuma boleh pilih satu, lo pilih mana?",
        "Ini buat lo yang lagi merasa stuck. Baca pelan-pelan:",
        "Share ke story kalau lo setuju sama ini:",
        "Jawab pake emoji: gimana perasaan lo hari ini?",
        "Yang follow gue pasti orang-orang ambisius. Bener gak?",
        "Tulis goals lo 2024 di komen. Let's manifest bareng!"
      ],
      template:[
        {title:"Template: Listicle Thread",structure:"Post 1: Hook + janji value\nPost 2: Poin #1 + penjelasan singkat\nPost 3: Poin #2 + penjelasan singkat\nPost 4: Poin #3 + penjelasan singkat\nPost 5: Recap + CTA (follow/save)"},
        {title:"Template: Storytelling Thread",structure:"Post 1: Hook cerita (situasi awal)\nPost 2: Konflik/masalah muncul\nPost 3: Titik balik/solusi ditemukan\nPost 4: Hasil & pelajaran\nPost 5: CTA + ajakan diskusi"},
        {title:"Template: Tutorial Thread",structure:"Post 1: Hook + preview hasil\nPost 2: Step 1 (persiapan)\nPost 3: Step 2 (eksekusi)\nPost 4: Step 3 (optimasi)\nPost 5: Tips bonus + CTA"},
        {title:"Template: Myth-Busting Thread",structure:"Post 1: Mitos populer yang salah\nPost 2: Fakta sebenarnya + data\nPost 3: Kenapa mitos ini berbahaya\nPost 4: Yang seharusnya dilakukan\nPost 5: Summary + CTA"},
        {title:"Template: Before-After Thread",structure:"Post 1: Hook kondisi 'before'\nPost 2: Apa yang diubah\nPost 3: Proses perubahan\nPost 4: Hasil 'after' + bukti\nPost 5: Action steps buat pembaca + CTA"}
      ],
      tips:[
        {title:"Konsisten Posting",desc:"Minimal 2x sehari. Pagi (7-9) dan malam (7-10). Algoritma suka akun yang aktif dan konsisten."},
        {title:"Hook Harus Nendang",desc:"3 detik pertama menentukan segalanya. Kalau hook lemah, konten sebagus apapun gak bakal dibaca."},
        {title:"Gunakan Carousel Effect",desc:"Bikin thread yang bikin orang swipe terus. Setiap post harus ada cliffhanger ke post berikutnya."},
        {title:"Engage Balik",desc:"Reply setiap komen yang masuk dalam 1 jam pertama. Ini boost engagement rate lo drastis."},
        {title:"Riset Konten Viral",desc:"Lihat apa yang viral di niche lo. ATM: Amati, Tiru, Modifikasi. Jangan copy paste!"},
        {title:"Pakai CTA yang Jelas",desc:"Setiap post harus ada CTA: follow, save, share, atau komen. Jangan biarin orang bingung."},
        {title:"Personal Branding",desc:"Orang follow orang, bukan konten. Tunjukkin personality lo. Be authentic & relatable."},
        {title:"Optimasi Profil",desc:"Bio harus jelas: siapa lo, apa value lo, kenapa harus follow. Pertama kali lihat = langsung paham."}
      ]
    };

    function renderEdukasi(){
      return data.edukasi.map(e=>`<div class="edu-card"><h3>${escapeHTML(e.title)}</h3><p>${escapeHTML(e.desc)}</p><div class="example">${escapeHTML(e.example)}</div></div>`).join('')
    }
    function renderHooks(arr,label){
      return `<h3 class="section-title">${escapeHTML(label)}</h3>`+arr.map(h=>`<div class="out-item" data-copy="${escapeAttr(h)}"><p>${escapeHTML(h)}</p></div>`).join('')
    }
    function renderTemplates(){
      return `<h3 class="section-title">Template Utas</h3>`+data.template.map(t=>`<div class="out-item" data-copy="${escapeAttr(t.structure)}"><h4>${escapeHTML(t.title)}</h4><p style="white-space:pre-line">${escapeHTML(t.structure)}</p></div>`).join('')
    }
    function renderTips(){
      return `<h3 class="section-title">Tips Viral</h3>`+data.tips.map(t=>`<div class="out-item" data-copy="${escapeAttr(t.title+': '+t.desc)}"><h4>${escapeHTML(t.title)}</h4><p>${escapeHTML(t.desc)}</p></div>`).join('')
    }

    const tabs={
      edukasi:()=>renderEdukasi(),
      pembuka:()=>renderHooks(data.pembuka,'Hook Pembuka'),
      story:()=>renderHooks(data.story,'Hook Storytelling'),
      kontroversi:()=>renderHooks(data.kontroversi,'Hook Kontroversi'),
      engagement:()=>renderHooks(data.engagement,'Hook Engagement'),
      template:()=>renderTemplates(),
      tips:()=>renderTips()
    };

    const content=document.getElementById('content');
    const toast=document.getElementById('toast');

    function showTab(tab){
      document.querySelectorAll('.menu-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
      content.innerHTML=tabs[tab]();
    }

    document.querySelector('.menu-grid').addEventListener('click',e=>{
      const btn=e.target.closest('.menu-btn');
      if(btn)showTab(btn.dataset.tab);
    });

    content.addEventListener('click',e=>{
      const item=e.target.closest('.out-item[data-copy]');
      if(!item)return;
      const text=item.getAttribute('data-copy');
      navigator.clipboard.writeText(text).then(()=>{
        toast.classList.add('show');
        setTimeout(()=>toast.classList.remove('show'),2000);
      });
    });

    showTab('edukasi');
  </script>
</body>
</html>
