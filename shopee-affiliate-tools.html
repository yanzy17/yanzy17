/* ====== UTILITIES ====== */
function escapeHTML(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escapeAttr(str){return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function copyText(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast()).catch(()=>fallbackCopy(text));
  }else{fallbackCopy(text);}
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast();}catch(e){alert('Gagal copy, coba manual ya');}
  document.body.removeChild(ta);
}
function showToast(){
  const t=document.getElementById('toast');t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

/* ====== EVENT DELEGATION FOR COPY ====== */
document.addEventListener('click',function(e){
  const item=e.target.closest('.out-item[data-copy]');
  if(!item)return;
  const text=item.getAttribute('data-copy');
  copyText(text);
  item.classList.add('copied');
  setTimeout(()=>item.classList.remove('copied'),1200);
});

/* ====== MENU NAVIGATION ====== */
const menuItems=document.querySelectorAll('.menu-item[data-section]');
const contentDiv=document.getElementById('content');

menuItems.forEach(mi=>{
  mi.addEventListener('click',()=>{
    menuItems.forEach(m=>m.classList.remove('active'));
    mi.classList.add('active');
    const sec=mi.getAttribute('data-section');
    renderSection(sec);
  });
});

function renderSection(sec){
  switch(sec){
    case 'riset':renderRiset();break;
    case 'caption':renderCaption();break;
    case 'hook':renderHooks();break;
    case 'cta':renderCTAs();break;
    case 'prompt':renderPrompts();break;
    case 'bonus':renderBonus();break;
    case 'edukasi':renderEdukasi();break;
    default:contentDiv.innerHTML='';
  }
}


/* ====== RISET SECTION ====== */
function renderRiset(){
  let cats=RISET_DATA.map((r,i)=>`<button class="pill${i===0?' active':''}" data-cat="${i}">${r.emoji} ${escapeHTML(r.cat)}</button>`).join('');
  contentDiv.innerHTML=`
    <section class="section active">
      <div class="card">
        <h3>🔍 Riset Produk Trending</h3>
        <p class="desc">Pilih kategori, temukan produk potensial buat dipromosiin!</p>
        <div class="pills" id="risetPills">${cats}</div>
        <div id="risetResult"></div>
      </div>
    </section>`;
  generateRiset(0);
  document.getElementById('risetPills').addEventListener('click',function(e){
    const pill=e.target.closest('.pill');
    if(!pill)return;
    this.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    generateRiset(parseInt(pill.getAttribute('data-cat')));
  });
}

function generateRiset(idx){
  const cat=RISET_DATA[idx];
  let html='<div class="riset-grid">';
  cat.items.forEach(item=>{
    const komisi=Math.floor(Math.random()*8)+3;
    const sales=Math.floor(Math.random()*9000)+1000;
    html+=`<div class="riset-item">${escapeHTML(item)}<small>💰 Komisi ~${komisi}% · 📦 ${sales.toLocaleString('id')}+ terjual</small></div>`;
  });
  html+='</div>';
  document.getElementById('risetResult').innerHTML=html;
}

/* ====== BONUS (KALKULATOR KOMISI) ====== */
function renderBonus(){
  contentDiv.innerHTML=`
    <section class="section active">
      <div class="card">
        <h3>🎁 Kalkulator Komisi</h3>
        <p class="desc">Hitung estimasi cuan affiliate lo per bulan. Masukin data, langsung keliatan hasilnya!</p>
        <div class="field"><label>Harga Produk (Rp)</label><input type="number" id="calcHarga" placeholder="cth: 150000"></div>
        <div class="field-row">
          <div class="field"><label>Komisi (%)</label><input type="number" id="calcKomisi" placeholder="cth: 5" value="5"></div>
          <div class="field"><label>Jumlah Terjual / Bulan</label><input type="number" id="calcQty" placeholder="cth: 100"></div>
        </div>
        <button class="btn" id="btnCalc">💰 Hitung Komisi</button>
        <div id="calcResult"></div>
      </div>
    </section>`;
  document.getElementById('btnCalc').addEventListener('click',hitungKomisi);
}

function hitungKomisi(){
  const harga=parseFloat(document.getElementById('calcHarga').value)||0;
  const komisi=parseFloat(document.getElementById('calcKomisi').value)||0;
  const qty=parseInt(document.getElementById('calcQty').value)||0;
  
  const perItem=harga*(komisi/100);
  const perBulan=perItem*qty;
  const per3Bulan=perBulan*3;
  const perTahun=perBulan*12;

  const fmt=n=>'Rp '+n.toLocaleString('id-ID');
  
  document.getElementById('calcResult').innerHTML=`
    <div class="calc-result">
      <div class="calc-row"><span>Komisi per item</span><strong>${fmt(perItem)}</strong></div>
      <div class="calc-row"><span>Total per bulan (${qty} pcs)</span><strong>${fmt(perBulan)}</strong></div>
      <div class="calc-row"><span>Proyeksi 3 bulan</span><strong>${fmt(per3Bulan)}</strong></div>
      <div class="calc-row total"><span>Proyeksi 1 tahun 🚀</span><strong>${fmt(perTahun)}</strong></div>
    </div>
    <p style="font-size:.75rem;color:var(--ink3);margin-top:8px;text-align:center;">*Estimasi. Komisi aktual tergantung program affiliate Shopee.</p>`;
}
